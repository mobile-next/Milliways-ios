name: Run Mobilewright

on:
  push:
    branches: ["*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .ipa for iOS real device
        run: |
          # create an .ipa file for real iOS devices
          make -j2 ipa | xcbeautify

      - name: Run tests using mobilewright
        env:
          MOBILECLI_TOKEN: ${{ secrets.MOBILEFLEET_API_KEY }}
        run: |
          # install mobilewright
          npm install --no-save mobilewright@latest

          # allocate devices
          npx -y @mobilenext/mobilecli@0.1.64 fleet allocate --platform "ios" --version "18.6.2" --verbose --wait --timeout 600
          npx -y @mobilenext/mobilecli devices -v
          npx -y @mobilenext/mobilecli apps install ./build/Milliways-unsigned.ipa
          # one of the tests is supposed to fail
          npx mobilewright test --reporter html || true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SAMPLES_UPLOAD_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload samples to S3
        run: |
          GITSHA=$( git rev-parse HEAD )
          aws s3 cp --quiet --recursive --acl public-read mobilewright-report s3://mobilewright-samples/milliways/runs/$GITSHA
          echo "→ Report uploaded to https://mobilewright-samples.s3.amazonaws.com/milliways/runs/$GITSHA/index.html"

